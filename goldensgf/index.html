.sc-sub{font-size:12px;color:var(--ink3);margin-top:4px}
.panel{display:none;padding:4px 0 48px}.panel.active{display:block}
.cc{background:var(--paper);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}

.pos-badge{font-size:12px;font-weight:600;color:var(--ink2)}

];
const favicon = d => `https://www.google.com/s2/favicons?domain=${d}&sz=32`;

const STATE = { tab: "overview", model: "all", time: "all", promptFilter: "all", search: "" };

function $(id){ return document.getElementById(id); }

function hasData(){ return (D_ORIG.prompts && D_ORIG.prompts.length > 0) || D_ORIG.meta.totalRuns > 0; }

function showApiBanner(){
  if (hasData()) return;
  const b = $("apiBanner");
  b.style.display = "block";
  b.innerHTML = `<b>No run data yet.</b> The AI Visibility brand exists (id <code>${D_ORIG.meta.brandId}</code>) but the /visibility and /competitors endpoints currently return 0 runs and 0 competitors. Once prompts run, paste the data into <code>D_ORIG</code> in this file and the report will populate automatically.`;
}

function renderStatRow(){
  const ps = D_ORIG.prompts;
  const totalPrompts = ps.length;
  const mentioned = ps.filter(p => (p.mentions||0) > 0).length;
  const promptAvg = totalPrompts ? Math.round(ps.reduce((a,p)=>a+(p.avgScore||0),0)/totalPrompts) : 0;
  const avgScore = (D_ORIG.meta.visibilityScore != null && D_ORIG.meta.totalRuns > 0) ? D_ORIG.meta.visibilityScore : promptAvg;
  const totalRuns = D_ORIG.meta.totalRuns || ps.reduce((a,p)=>a+(p.totalRuns||0),0);
  const totalMentions = ps.reduce((a,p)=>a+(p.mentions||0),0);
  const compCount = D_ORIG.competitors.length;
  const trendStr = D_ORIG.meta.trend === "up" ? "▲ trending up" : D_ORIG.meta.trend === "down" ? "▼ trending down" : "stable";
  const cards = [
    { label: "Visibility Score", val: avgScore, sub: `0-100 · ${trendStr}`, cls: avgScore>=60?"good":avgScore>=30?"warn":"" },
    { label: "Total Prompts",    val: totalPrompts || "—", sub: totalPrompts ? `${mentioned} mentioned` : "per-prompt data unavailable" },
    { label: "Total Runs",       val: totalRuns,    sub: "across all models" },
    { label: "Total Mentions",   val: totalPrompts ? totalMentions : "—", sub: totalPrompts ? `${totalRuns?Math.round(totalMentions/totalRuns*100):0}% mention rate` : "per-prompt data unavailable" },
    { label: "AI Models",        val: MODELS.length, sub: "tracked" },
    { label: "Competitors",      val: compCount,    sub: compCount ? "tracked" : "none configured" }
  ];
  $("statRow").innerHTML = cards.map(c =>
    `<div class="stat-card"><div class="sc-label">${c.label}</div><div class="sc-val ${c.cls||""}">${c.val}</div><div class="sc-sub">${c.sub}</div></div>`
  ).join("");
}

function renderOverview(){
  if (!hasData()){
    $("ovContent").innerHTML = noData("Overview will populate once the first AI Visibility run completes for Golden SGF.");
    return;
  }
  if (!D_ORIG.prompts || D_ORIG.prompts.length === 0){
    const s = D_ORIG.meta.visibilityScore || 0;
    const trendStr = D_ORIG.meta.trend === "up" ? "▲ trending up" : D_ORIG.meta.trend === "down" ? "▼ trending down" : "— stable";
    const scoreColor = s>=60?"var(--good)":s>=30?"var(--warn)":"var(--ink)";
    $("ovContent").innerHTML = `
      <div class="cc">
        <div class="cc-head"><div class="cc-title">Aggregate Visibility</div><div class="cc-sub">overall score across all prompts × models</div></div>
        <div class="cc-body" style="text-align:center;padding:36px 20px">
          <div style="font-size:56px;font-weight:700;line-height:1;color:${scoreColor}">${s}<span style="font-size:24px;color:var(--ink4);font-weight:500"> / 100</span></div>
          <div style="font-size:13px;color:var(--ink3);margin-top:10px">${D_ORIG.meta.totalRuns} runs · ${trendStr}</div>
          <div style="font-size:12px;color:var(--ink4);margin-top:18px;max-width:520px;margin-left:auto;margin-right:auto;line-height:1.55">Per-prompt and per-model breakdown is not exposed by the AI Visibility MCP API. The Prompts, Sentiment, and Citations tabs remain empty until prompt-level data can be extracted.</div>
        </div>
      </div>`;
    return;
  }
  // Per-model visibility bars
  const modelStats = MODELS.map(m => {
    let mentions = 0, runs = 0;
    D_ORIG.prompts.forEach(p => {
      const mr = p.models && p.models[m.id];
      if (mr){
        runs += 1;
        if (mr.mentioned) mentions += 1;
      }
    });
    const pct = runs ? Math.round(mentions/runs*100) : 0;
    return { ...m, mentions, runs, pct };
  });
  const bars = modelStats.map(m => `
    <div class="ov-bar-row">
      <div class="ov-bar-lbl"><img src="${favicon(m.domain)}"><span>${m.label}</span></div>
      <div class="ov-bar-track"><div class="ov-bar-fill" style="width:${m.pct}%"></div></div>
      <div class="ov-bar-val">${m.pct}% <span style="color:var(--ink4)">(${m.mentions}/${m.runs})</span></div>
    </div>`).join("");
  $("ovContent").innerHTML = `
    <div class="cc">
      <div class="cc-head"><div class="cc-title">Visibility by Model</div><div class="cc-sub">mention rate per AI platform</div></div>
      <div class="cc-body">${bars || noDataSmall("No model coverage yet.")}</div>
    </div>`;
}

function renderPrompts(){
  const tbody = $("promptsTbody");
  let rows = D_ORIG.prompts.slice();
  if (STATE.promptFilter === "mentioned") rows = rows.filter(p => (p.mentions||0) > 0);
  if (STATE.promptFilter === "not")       rows = rows.filter(p => (p.mentions||0) === 0);
  if (STATE.search) rows = rows.filter(p => (p.text||"").toLowerCase().includes(STATE.search.toLowerCase()));
  $("promptsSub").textContent = `${rows.length} of ${D_ORIG.prompts.length} prompts`;
  if (!rows.length){
    const msg = (D_ORIG.meta.totalRuns > 0)
      ? `Per-prompt detail is not exposed by the AI Visibility MCP API. Aggregate: <b>${D_ORIG.meta.visibilityScore}/100</b> across ${D_ORIG.meta.totalRuns} runs.`
      : "No prompts to show. Add prompts in the AI Visibility dashboard, run them, then drop the data into D_ORIG.";
    tbody.innerHTML = `<tr><td colspan="6">${noData(msg)}</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(p => {
    const vis = (p.avgScore||0) >= 50 ? "vis-full" : (p.avgScore||0) > 0 ? "vis-part" : "vis-none";
    const dots = MODELS.map(m => {
      const mr = p.models && p.models[m.id];
      const missed = !mr || !mr.mentioned;
      return `<span class="mdot-wrap" data-tip="${m.label}: ${mr ? (mr.mentioned ? "mentioned" : "not mentioned") : "no run"}"><img class="mdot-img ${missed?"mdot-miss":""}" src="${favicon(m.domain)}"></span>`;
    }).join("");
    const sentiments = MODELS.map(m => p.models && p.models[m.id] && p.models[m.id].sentiment).filter(Boolean);
    const sent = sentiments[0] || "—";
    const sentClass = sent === "positive" ? "chip-positive" : sent === "negative" ? "chip-negative" : sent === "uncertain" ? "chip-uncertain" : "chip-neutral";
    return `<tr>
      <td><div class="pt-text">${escapeHtml(p.text||"")}</div></td>
      <td><span class="vis-badge ${vis}">${Math.round(p.avgScore||0)}%</span></td>
      <td><span class="pos-badge">${(p.avgPosition||"—")}</span></td>
      <td>${sent==="—"?'<span style="color:var(--ink4)">—</span>':`<span class="sent-chip ${sentClass}">${sent}</span>`}</td>
      <td><div class="model-dots">${dots}</div></td>
      <td><span style="color:var(--ink4)">—</span></td>
    </tr>`;
  }).join("");
}

function renderSentiment(){
  if (!hasData()){
    $("sentContent").innerHTML = noData("Sentiment breakdown will populate once prompts return mentions.");
    return;
  }
  const s = D_ORIG.sentiment || {};
  const cards = D_ORIG.sentimentCards || [];
  const sentTotal = (s.positive||0)+(s.neutral||0)+(s.negative||0)+(s.uncertain||0);
  if (sentTotal === 0 && cards.length === 0){
    $("sentContent").innerHTML = noData("No mentions with sentiment classification yet — the brand has runs but no model expressed sentiment.");
    return;
  }
  const filter = STATE.sentFilter || "all";
  const filtered = filter === "all" ? cards : cards.filter(c => c.sentiment === filter);
  const modelMeta = m => MODELS.find(x => x.id === m) || { label: m, domain: "" };
  const sentChipClass = sent => sent === "positive" ? "chip-positive"
                              : sent === "negative" ? "chip-negative"
                              : sent === "uncertain" ? "chip-uncertain" : "chip-neutral";
  const cardsHtml = filtered.map(c => {
    const mm = modelMeta(c.model);
    const body = c.mentionSummary || c.snippet || "";
    return `
      <div class="sm-card">
        <div class="smc-head">
          <div class="smc-prompt">${escapeHtml(c.prompt)}</div>
        </div>
        <div class="smc-meta">
          <span class="model-chip"><img src="${favicon(mm.domain)}">${mm.label}</span>
          <span class="sent-chip ${sentChipClass(c.sentiment)}">${c.sentiment}</span>
          <span style="color:var(--ink4);font-size:11px">score ${c.score}${c.rank!=null?(' · rank '+c.rank):''}${c.date?(' · '+c.date):''}</span>
        </div>
        ${body ? `<div class="smc-context">${escapeHtml(body)}</div>` : ""}
      </div>`;
  }).join("") || noDataSmall("No mentions match this sentiment filter.");
  $("sentContent").innerHTML = `
    <div class="sent-tiles">
      <div class="sent-tile spos"><div class="st-num">${s.positive||0}</div><div class="st-lbl">Positive</div></div>
      <div class="sent-tile sneu"><div class="st-num">${s.neutral||0}</div><div class="st-lbl">Neutral</div></div>
      <div class="sent-tile sneg"><div class="st-num">${s.negative||0}</div><div class="st-lbl">Negative</div></div>
      <div class="sent-tile sunc"><div class="st-num">${s.uncertain||0}</div><div class="st-lbl">Uncertain</div></div>
    </div>
    <div class="filter-bar" style="border-radius:8px;border:1px solid var(--border);margin-bottom:14px">
      <button class="fb-btn ${filter==='all'?'active':''}" onclick="setSentFilter('all')">All (${cards.length})</button>
      <button class="fb-btn ${filter==='positive'?'active':''}" onclick="setSentFilter('positive')">Positive (${s.positive||0})</button>
      <button class="fb-btn ${filter==='neutral'?'active':''}" onclick="setSentFilter('neutral')">Neutral (${s.neutral||0})</button>
      <button class="fb-btn ${filter==='negative'?'active':''}" onclick="setSentFilter('negative')">Negative (${s.negative||0})</button>
    </div>
    ${cardsHtml}`;
}
function setSentFilter(f){ STATE.sentFilter = f; renderSentiment(); }

function renderCompetitors(){
  const cs = D_ORIG.competitors;
  $("compSub").textContent = `${cs.length} tracked`;
  if (!cs.length){
    $("compList").innerHTML = noData("No competitors configured for Golden SGF. Add competitors via the AI Visibility dashboard or the add_competitor API call.");
    $("compInsight").innerHTML = noDataSmall("Competitive positioning will appear once competitors are tracked and prompts have run.");
    return;
  }
  const metric = c => (c.mentions != null ? c.mentions : (c.visibilityScore||0));
  const max = Math.max(...cs.map(metric), 1);
  $("compList").innerHTML = cs.map((c,i) => `
    <div class="comp-row">
      <div class="comp-rank">${i+1}</div>
      <img class="comp-fav" src="${favicon(c.domain||c.name)}">
      <div class="comp-name">${escapeHtml(c.name||"")}</div>
      <div class="comp-bar-wrap"><div class="comp-bar" style="width:${metric(c)/max*100}%"></div></div>
      <div class="comp-count">${c.mentions != null ? (c.mentions + " mentions") : "—"}</div>
      <div class="comp-score">${Math.round(c.visibilityScore||0)}%</div>
    </div>`).join("");
  $("compInsight").innerHTML = `<div style="font-size:12.5px;color:var(--ink2);line-height:1.6">${cs.length} competitor${cs.length===1?"":"s"} tracked. Leader: <b>${escapeHtml(cs[0].name||"—")}</b> with ${cs[0].mentions||0} mentions.</div>`;
}

function renderCitations(){
  const c = D_ORIG.citations;
  if (!c.length){
    $("citContent").innerHTML = noData("Citation data is part of per-prompt detail and is not exposed by the AI Visibility MCP API.");
    return;
  }
  const max = Math.max(...c.map(x => x.count||0), 1);
  $("citContent").innerHTML = `
    <div class="cc">
      <div class="cc-head"><div class="cc-title">Top Cited Domains</div><div class="cc-sub">${c.length} domains</div></div>
      <div class="cc-body">
        ${c.map(d => `<div class="bar-row">
          <div class="bar-label">${escapeHtml(d.domain||"")}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(d.count||0)/max*100}%"></div></div>
          <div class="bar-pct">${Math.round((d.count||0)/max*100)}%</div>
        </div>`).join("")}
      </div>
    </div>`;
}

function noData(msg){
  return `<div class="no-data"><div class="no-data-icon">·</div><h3>No data yet</h3><p>${msg}</p></div>`;
}
function noDataSmall(msg){
  return `<div style="padding:14px;color:var(--ink4);font-size:12.5px;text-align:center">${msg}</div>`;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

function switchTab(tab, btn){
  STATE.tab = tab;
  document.querySelectorAll(".stab").forEach(b => b.classList.toggle("active", b === btn));
  document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === "panel-"+tab));
}
function setModel(m, btn){
  STATE.model = m;
  document.querySelectorAll(".mb-btn").forEach(b => b.classList.toggle("active", b === btn));
  renderAll();
}
function setTimeRange(t, btn){
  STATE.time = t;
  document.querySelectorAll(".tf-btn").forEach(b => b.classList.toggle("active", b === btn));
  renderAll();
}
function setPromptFilter(f, btn){
  STATE.promptFilter = f;
  document.querySelectorAll("#panel-prompts .fb-btn").forEach(b => b.classList.toggle("active", b === btn));
  renderPrompts();
}
function onPromptSearch(v){ STATE.search = v; renderPrompts(); }

function renderAll(){
  showApiBanner();
  renderStatRow();
  renderOverview();
  renderPrompts();
  renderSentiment();
  renderCompetitors();
  renderCitations();
}

renderAll();
</script>
</body>
</html>
